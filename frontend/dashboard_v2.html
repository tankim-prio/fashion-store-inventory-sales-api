<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fashion Store Dashboard</title>
    <link rel="stylesheet" href="/site/assets/styles.css?v=22000">
</head>
<body>

<header class="topbar">
    <div class="topbar-inner">
        <div class="topbar-brand">Fashion Store</div>

        <nav class="desktop-nav">
            <button onclick="loadDashboard()">Dashboard</button>
            <button onclick="loadCategoriesPage()">Categories</button>
            <button onclick="loadProductsPage()">Products</button>
            <button onclick="loadVariantsPage()">Variants</button>
            <button onclick="loadStockPage()">Stock</button>
            <button onclick="loadCustomersPage()">Customers</button>
            <button onclick="loadOrdersPage()">Orders</button>
            <button onclick="loadPaymentsPage()">Payments</button>
            <button onclick="loadInvoicesPage()">Invoices</button>
            <button onclick="loadReportsPage()">Reports</button>
            <button class="admin-only" onclick="loadUsersPage()">Users</button>
        </nav>

        <div class="topbar-actions">
            <button class="profile-btn" onclick="toggleProfilePanel()" aria-label="Account">
                <span class="profile-avatar">A</span>
            </button>

            <button class="mobile-menu-btn" onclick="toggleMobileMenu()" aria-label="Menu">
                ☰
            </button>
        </div>
    </div>

    <nav class="mobile-menu" id="mobileMenu">
        <button onclick="loadDashboard()">Dashboard</button>
        <button onclick="loadCategoriesPage()">Categories</button>
        <button onclick="loadProductsPage()">Products</button>
        <button onclick="loadVariantsPage()">Variants</button>
        <button onclick="loadStockPage()">Stock</button>
        <button onclick="loadCustomersPage()">Customers</button>
        <button onclick="loadOrdersPage()">Orders</button>
        <button onclick="loadPaymentsPage()">Payments</button>
        <button onclick="loadInvoicesPage()">Invoices</button>
        <button onclick="loadReportsPage()">Reports</button>
        <button class="admin-only" onclick="loadUsersPage()">Users</button>
    </nav>
</header>

<div class="profile-panel" id="profilePanel">
    <div class="profile-panel-header">
        <div class="profile-avatar profile-avatar-large">A</div>

        <div class="profile-title-box">
            <h3 id="profileDisplayName">Account</h3>
            <p id="profileDisplayRole">Loading...</p>
        </div>
    </div>

    <div id="profileMessage" class="profile-message"></div>

    <div id="profileViewMode">
        <div class="profile-info-row">
            <span>Name</span>
            <strong id="profileViewName">-</strong>
        </div>

        <div class="profile-info-row">
            <span>Email</span>
            <strong id="profileViewEmail">-</strong>
        </div>

        <div class="profile-info-row">
            <span>Phone</span>
            <strong id="profileViewPhone">Not added</strong>
        </div>

        <button class="profile-edit-btn" onclick="openProfileEdit()">Edit Profile</button>
        <button class="profile-logout" onclick="logout()">Sign out</button>
    </div>

    <div id="profileEditMode" class="hidden">
        <label>Full Name</label>
        <input type="text" id="profileName" placeholder="Full name">

        <label>Email</label>
        <input type="email" id="profileEmail" placeholder="Email" disabled>

        <label>Phone</label>
        <input type="text" id="profilePhone" placeholder="Phone">

        <button class="profile-save" onclick="saveProfile()">Save Changes</button>
        <button class="profile-cancel-btn" onclick="cancelProfileEdit()">Cancel</button>
    </div>
</div>

<main class="dashboard">
    <section class="welcome">
        <h1 id="pageTitle">Dashboard</h1>
        <p id="pageSubtitle">Interactive fashion store inventory and sales management dashboard.</p>
    </section>

    <section id="mainContent"></section>
</main>

<script src="/site/assets/dashboard_final.js?v=22000"></script>
</body>
</html>
