<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login - Fashion Store API</title>
    <link rel="stylesheet" href="/site/assets/styles.css?v=10000">
</head>
<body class="auth-body">

    <div class="auth-card">
        <h1>Fashion Store</h1>
        <p class="subtitle">Inventory & Sales Management</p>

        <div id="errorBox" class="error-box"></div>

        <form id="loginForm">
            <label>Email</label>
            <input type="email" id="email" placeholder="admin2@gmail.com" required>

            <label>Password</label>
            <input type="password" id="password" placeholder="123456" required>

            <button type="submit">Login</button>
        </form>

        <p class="hint">
            Use your registered admin/staff email and password.
        </p>
    </div>

    <script src="/site/assets/app.js"></script>
</body>
</html>
